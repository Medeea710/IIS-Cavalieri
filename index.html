<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La nostra scuola</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            /* Font di base per il sito */
            font-family: 'Segoe UI', sans-serif;
            background-color: #fdfdfd;
            overflow: hidden;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px); /* Effetto vetro sfocato */
            border-bottom: 2px solid #f0f0f0;
        }

        /* STILE DEL TITOLO "ACCOGLIENTE" */
        h1 {
            font-family: 'Comfortaa', cursive; /* Font arrotondato */
            color: #4a90e2; /* Un blu più morbido e rassicurante */
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px; /* Avvicina leggermente le lettere per un look più compatto */
        }

        .canva-container {
            position: relative;
            width: 100%;
            height: 100vh;
            padding-top: 70px;
        }

        .canva-embed {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>La nostra scuola</h1>
    </header>

    <div class="canva-container">
        <iframe class="canva-embed" 
            src="https://www.canva.com/design/DAF_v2p8A0E/view?embed" 
            allowfullscreen="allowfullscreen" allow="fullscreen">
        </iframe>
    </div>

</body>
</html>
